<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="x-apple-disable-message-reformatting">
    <title>{% block title %}ApplyIQ{% endblock %}</title>
    <!--[if mso]>
    <noscript><xml>
        <o:OfficeDocumentSettings>
            <o:AllowPNG/>
            <o:PixelsPerInch>96</o:PixelsPerInch>
        </o:OfficeDocumentSettings>
    </xml></noscript>
    <![endif]-->
    <style>
        * { margin: 0; padding: 0; }
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #f4f4f7; }
        @media only screen and (max-width: 620px) {
            .email-container { width: 100% !important; max-width: 100% !important; }
            .fluid { max-width: 100% !important; height: auto !important; }
            .stack-column { display: block !important; width: 100% !important; max-width: 100% !important; }
            .stack-column-center { text-align: center !important; }
            .center-on-narrow { text-align: center !important; display: block !important; margin-left: auto !important; margin-right: auto !important; float: none !important; }
            table.center-on-narrow { display: inline-block !important; }
            .mobile-padding { padding-left: 16px !important; padding-right: 16px !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">

    <!-- Pre-header (hidden text for email preview) -->
    <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">
        {% block preheader %}ApplyIQ — Your AI Job Application Assistant{% endblock %}
    </div>

    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f4f4f7;">
        <tr>
            <td align="center" style="padding: 24px 12px;">

                <!-- ===== HEADER ===== -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" class="email-container" style="max-width: 600px;">
                    <tr>
                        <td style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); padding: 28px 32px; border-radius: 12px 12px 0 0; text-align: center;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="text-align: center;">
                                        <!-- Logo placeholder: replace src with actual logo URL -->
                                        <div style="display: inline-block; width: 44px; height: 44px; background-color: #6C63FF; border-radius: 10px; line-height: 44px; text-align: center; font-size: 22px; font-weight: 700; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif;">A</div>
                                        <span style="display: inline-block; vertical-align: middle; margin-left: 10px; font-size: 24px; font-weight: 700; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; letter-spacing: -0.5px;">ApplyIQ</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>

                <!-- ===== BODY ===== -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" class="email-container" style="max-width: 600px;">
                    <tr>
                        <td style="background-color: #ffffff; padding: 36px 32px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; line-height: 1.6; color: #374151;" class="mobile-padding">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                </table>

                <!-- ===== FOOTER ===== -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" class="email-container" style="max-width: 600px;">
                    <tr>
                        <td style="background-color: #f9fafb; padding: 24px 32px; border-radius: 0 0 12px 12px; border-top: 1px solid #e5e7eb; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; color: #9ca3af; line-height: 1.5;">
                            <p style="margin: 0 0 8px 0;">
                                <a href="{{ app_url }}/settings" style="color: #6C63FF; text-decoration: none;">Settings</a>
                                &nbsp;&middot;&nbsp;
                                <a href="{{ app_url }}/dashboard" style="color: #6C63FF; text-decoration: none;">Dashboard</a>
                                &nbsp;&middot;&nbsp;
                                <a href="{{ app_url }}/unsubscribe?email={{ user_email }}" style="color: #6C63FF; text-decoration: none;">Unsubscribe</a>
                            </p>
                            <p style="margin: 0;">
                                ApplyIQ &mdash; AI-Powered Job Applications<br>
                                &copy; {{ current_year | default("2026") }} ApplyIQ. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>
</body>
</html>
